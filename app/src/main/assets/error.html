<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0E0E16; color:#fff; text-align:center;
  }
  .icon {
    width:96px; height:96px; border-radius:28px;
    background:linear-gradient(135deg,#4F46E5,#7C3AED);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:24px; font-size:44px;
    box-shadow:0 12px 40px rgba(79,70,229,.4);
  }
  h1 { font-size:21px; font-weight:700; margin-bottom:10px; }
  p { font-size:14px; line-height:1.6; color:#9b9bb0; max-width:300px; margin-bottom:28px; }
  button {
    border:none; cursor:pointer;
    background:linear-gradient(135deg,#4F46E5,#7C3AED); color:#fff;
    font-size:15px; font-weight:600; padding:14px 38px; border-radius:14px;
    box-shadow:0 8px 24px rgba(79,70,229,.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  button:active { transform:scale(.96); box-shadow:0 4px 14px rgba(79,70,229,.3); }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>No Connection</h1>
  <p>Couldn't reach the server. Check your internet connection and try again.</p>
  <button onclick="reload()">Try Again</button>
<script>
  function reload(){
    if (window.AndroidApp && window.AndroidApp.retry) { window.AndroidApp.retry(); }
    else { location.reload(); }
  }
</script>
</body>
</html>
